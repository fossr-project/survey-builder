services:
    graphdb:
        image: ontotext/graphdb:11.2.0
        container_name: graphdb
        ports:
            - "7200:7200"
        
    limesurvey:
        build:
            context: limesurvey/6.0/apache/
            dockerfile: Dockerfile
        volumes:
            # TODO Update storage location as desired
            - ./surveys:/var/www/html/upload/surveys
        networks:
            - limesurvey-db
        ports:
            - "8080:8080"
        environment:
            - "DB_HOST=lime-db"
            - "DB_PASSWORD=surveybuilder"
            - "ADMIN_PASSWORD=admin"
            # If you require an empty table prefix, use a space as the DB_TABLE_PREFIX
            # - "DB_TABLE_PREFIX= "
    lime-db:
        image: mariadb:11.4
        networks:
            - limesurvey-db
        environment:
            - "MYSQL_USER=limesurvey"
            - "MYSQL_DATABASE=limesurvey"
            - "MYSQL_PASSWORD=surveybuilder"
            - "MYSQL_ROOT_PASSWORD=admin"

networks:
  limesurvey-db:
    driver: bridge
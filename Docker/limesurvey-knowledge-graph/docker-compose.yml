# =============================================================
# docker-compose.yml — Survey Builder App
# =============================================================
# ARCHITETTURA SCELTA: due compose separati
#
#   docker-compose.yml        ← questo file (la TUA app)
#   docker-compose.infra.yml  ← GraphDB + LimeSurvey + MySQL
#
# PERCHÉ separarli?
#   - L'infrastruttura (GraphDB, LimeSurvey) si avvia una volta
#     e rimane su. La riavvii solo se cambia la configurazione.
#   - La tua app (survey-builder) la riavvii spesso durante sviluppo.
#   - Separandoli puoi fare "docker compose up" solo sull'app
#     senza toccare i servizi che già funzionano.
#   - Comunicano tramite una rete esterna condivisa: "survey-network"
#     (creata dal docker-compose.infra.yml).
# =============================================================

services:

  # =============================================================
  # SURVEY BUILDER — la tua applicazione Flask
  # =============================================================
  survey-builder:
    build:
      context: .
      dockerfile: Dockerfile.builder

    container_name: survey-builder
    restart: unless-stopped

    ports:
      # "5001:5005" = porta_host:porta_container
      # Accedi da browser su http://localhost:5001
      # Flask dentro il container gira su 5005
      # Puoi cambiare 5001 se è occupata sul tuo Mac
      - "5001:5005"

    environment:
      # --- LimeSurvey (gira nel compose infra) ---
      LIMESURVEY_URL: http://limesurvey:8080/index.php/admin/remotecontrol
      LIMESURVEY_USERNAME: admin
      LIMESURVEY_PASSWORD: admin

      # --- GraphDB (gira nel compose infra) ---
      GRAPHDB_URL: http://graphdb:7200
      GRAPHDB_USERNAME: admin
      GRAPHDB_PASSWORD: admin
      GRAPHDB_REPOSITORY: test_repo

      # --- Flask ---
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5005

      # =============================================================
      # FLASK_DEBUG in sviluppo vs produzione
      # =============================================================
      # "True"  → Flask ricarica automaticamente app.py ad ogni
      #           salvataggio. MA in Docker questo NON funziona
      #           da solo: serve il volume (vedi sotto).
      #           Inoltre mostra errori dettagliati nel browser.
      # "False" → Modalità produzione: più veloce, nessun debug info.
      # Durante sviluppo tienilo "True", prima di deployare mettilo "False".
      FLASK_DEBUG: "True"

      PYTHONUNBUFFERED: 1
      # PERCHÉ PYTHONUNBUFFERED=1?
      #   - Python di default bufferizza stdout/stderr.
      #   - Con questo flag i print() e i log appaiono immediatamente
      #     in "docker compose logs", non dopo secondi o mai.

    volumes:
      # =============================================================
      # VOLUMI: il segreto per sviluppare senza duplicare il codice
      # =============================================================
      #
      # SINTASSI: /percorso/sul/tuo/mac:/percorso/nel/container
      #
      # Cosa succede: Docker "monta" la tua cartella locale dentro
      # il container. Non copia i file: il container legge direttamente
      # dal tuo disco. Quando salvi in PyCharm, il container vede
      # subito il file aggiornato.
      #
      # CON FLASK_DEBUG=True: Flask rileva il cambiamento e si
      # riavvia in ~1 secondo. Nessun "docker compose restart" necessario.
      # =============================================================

      # app.py — il file che modifichi più spesso
      - ./app.py:/app/app.py

      # File RML mapping .ttl — se li modifichi, vengono aggiornati
      # Nota: il pattern *.ttl non funziona nei volumi, quindi
      # monta l'intera directory corrente per i .ttl oppure
      # elenca i singoli file (vedi nota sotto *)
      - ./templates:/app/templates
      - ./static:/app/static
      - ./exports:/app/exports

      # pyrml: NON lo montiamo come volume perché è una libreria
      # esterna che non modifichi. Rimane quella copiata nel Dockerfile.

      # Log persistenti anche dopo docker compose down
      - builder_logs:/app/logs

      # (*) Se hai più file .ttl con nomi fissi, aggiungili così:
      # - ./mio_mapping.ttl:/app/mio_mapping.ttl
      # - ./altro_mapping.ttl:/app/altro_mapping.ttl
      # Oppure metti tutti i .ttl in una cartella "mappings/" e monta:
      # - ./mappings:/app/mappings

    # =============================================================
    # RETE ESTERNA
    # =============================================================
    # "external: true" significa che questa rete NON viene creata
    # da questo compose, ma esiste già (creata da docker-compose.infra.yml).
    # survey-builder si collega a graphdb e limesurvey usando i loro
    # nomi container come hostname (es: http://graphdb:7200).
    networks:
      - survey-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/"]
      interval: 30s
      timeout: 10s
      retries: 5

# =============================================================
# VOLUMI
# =============================================================
volumes:
  builder_logs:
    driver: local

# =============================================================
# RETE — dichiarata come esterna
# =============================================================
networks:
  survey-network:
    external: true
    # Questa rete è creata da docker-compose.infra.yml.
    # Se provi ad avviare questo compose senza aver avviato prima
    # l'infra, riceverai: "network survey-network not found".
    # Soluzione: avvia sempre prima l'infra.
